<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>33.3FM — Virtual Signal Studio</title>
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to index
    var path = window.location.pathname;
    var query = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = window.location.origin + '/?p=' + encodeURIComponent(path + query) + hash;
    window.location.replace(redirectUrl);
  </script>
</head>
<body>
  <p>Redirecting to 33.3FM Virtual Signal Studio...</p>
</body>
</html>
